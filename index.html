<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="script-src 'unsafe-inline' 'self';">
<title>行事曆</title>
<style>
body{background:#cdd9d0;padding:16px;font-family:sans-serif;}
#dbg{background:#fff;padding:10px;border-radius:8px;margin-bottom:10px;font-size:13px;}
.g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.c{background:#dce8de;border:1px solid #b8ccbc;border-radius:4px;min-height:60px;padding:4px;font-size:13px;font-weight:700;}
.o{opacity:.4;} .t{background:#3a6b45;color:#fff;} .w{color:#b83232;}
</style>
</head>
<body>
<div id="dbg">waiting</div>
<div id="title" style="font-size:32px;font-weight:800;margin-bottom:8px;color:#152a18;">...</div>
<div style="display:flex;gap:8px;margin-bottom:8px;">
<button id="p" style="padding:8px 16px;border:2px solid #5a9a60;background:#fff;border-radius:20px;cursor:pointer;">&lt;</button>
<button id="td" style="padding:8px 16px;border:2px solid #5a9a60;background:#fff;border-radius:20px;cursor:pointer;">Today</button>
<button id="n" style="padding:8px 16px;border:2px solid #5a9a60;background:#fff;border-radius:20px;cursor:pointer;">&gt;</button>
</div>
<div class="g" style="margin-bottom:3px;">
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;color:#b83232;font-weight:700;">Sun</div>
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;font-weight:700;">Mon</div>
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;font-weight:700;">Tue</div>
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;font-weight:700;">Wed</div>
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;font-weight:700;">Thu</div>
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;font-weight:700;">Fri</div>
<div style="background:#e8f1ea;text-align:center;padding:6px;border-radius:4px;color:#b83232;font-weight:700;">Sat</div>
</div>
<div class="g" id="cal"></div>
<script>
document.getElementById('dbg').textContent='JS OK';
document.getElementById('dbg').style.background='#d4f0d4';
var T=new Date();T.setHours(0,0,0,0);
var cur=new Date(T.getFullYear(),T.getMonth(),1);
function build(){
var y=cur.getFullYear(),m=cur.getMonth();
document.getElementById('title').textContent=y+'/'+(m+1);
var cal=document.getElementById('cal');cal.innerHTML='';
var fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),dp=new Date(y,m,0).getDate();
for(var i=0;i<Math.ceil((fd+dm)/7)*7;i++){
var dn,cy=y,cm=m,ot=false;
if(i<fd){dn=dp-fd+1+i;cm=m-1;if(cm<0){cm=11;cy--;}ot=true;}
else if(i-fd>=dm){dn=i-fd-dm+1;cm=m+1;if(cm>11){cm=0;cy++;}ot=true;}
else dn=i-fd+1;
var isTd=!ot&&dn===T.getDate()&&m===T.getMonth()&&y===T.getFullYear();
var dow=i%7;
var cell=document.createElement('div');
cell.className='c'+(ot?' o':'')+(isTd?' t':'')+(dow===0||dow===6?' w':'');
cell.textContent=dn;cal.appendChild(cell);}
document.getElementById('dbg').textContent='done '+cal.children.length+' cells';
}
document.getElementById('p').onclick=function(){cur.setMonth(cur.getMonth()-1);build();};
document.getElementById('n').onclick=function(){cur.setMonth(cur.getMonth()+1);build();};
document.getElementById('td').onclick=function(){cur=new Date(T.getFullYear(),T.getMonth(),1);build();};
build();
</script>
</body>
</html>
