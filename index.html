<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>行事曆</title>
<style>
body{background:#cdd9d0;font-family:sans-serif;padding:16px;}
.month-title{font-size:40px;font-weight:800;color:#152a18;margin-bottom:12px;}
.month-title span{color:#2a6e38;}
.nav-group{display:flex;gap:8px;margin-bottom:12px;}
.nav-btn{height:36px;padding:0 14px;border:2px solid #5a9a60;background:#fff;color:#1a5020;border-radius:20px;cursor:pointer;font-size:14px;font-weight:700;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.wd{background:#e8f1ea;text-align:center;padding:8px;font-size:13px;font-weight:700;color:#5c7a62;border-radius:4px;}
.wd:first-child,.wd:last-child{color:#b83232;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{background:#dce8de;border:1.5px solid #b8ccbc;border-radius:5px;min-height:80px;padding:6px;}
.day-cell.other{opacity:.5;}
.day-cell.today .day-num{background:#3a6b45;color:#fff;border-radius:50%;width:26px;height:26px;display:grid;place-items:center;}
.day-cell.weekend .day-num{color:#b83232;}
.day-num{font-size:14px;font-weight:800;width:26px;height:26px;display:grid;place-items:center;}
#dbg{background:#fff;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:#333;}
</style>
</head>
<body>
<div id="dbg">等待...</div>
<div class="month-title" id="mt">載入中</div>
<div class="nav-group">
  <button class="nav-btn" id="p">&lt;</button>
  <button class="nav-btn" id="t">今天</button>
  <button class="nav-btn" id="n">&gt;</button>
</div>
<div class="weekdays">
  <div class="wd">日</div><div class="wd">一</div><div class="wd">二</div>
  <div class="wd">三</div><div class="wd">四</div><div class="wd">五</div><div class="wd">六</div>
</div>
<div class="cal-grid" id="cal"></div>
<script>
var ZHM=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
var TODAY=new Date();TODAY.setHours(0,0,0,0);
var cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);

function build(){
var dbg=document.getElementById(‘dbg’);
var y=cur.getFullYear(),m=cur.getMonth();
dbg.textContent=‘build開始 y=’+y+’ m=’+m;
document.getElementById(‘mt’).innerHTML=y+’ <span style="color:#2a6e38">’+ZHM[m]+’</span>’;
var cal=document.getElementById(‘cal’);cal.innerHTML=’’;
var fd=new Date(y,m,1).getDay();
var dm=new Date(y,m+1,0).getDate();
var dp=new Date(y,m,0).getDate();
var total=Math.ceil((fd+dm)/7)*7;
dbg.textContent=‘fd=’+fd+’ dm=’+dm+’ total=’+total;
for(var i=0;i<total;i++){
var dn,cy=y,cm=m,other=false;
if(i<fd){dn=dp-fd+1+i;cm=m-1;if(cm<0){cm=11;cy–;}other=true;}
else if(i-fd>=dm){dn=i-fd-dm+1;cm=m+1;if(cm>11){cm=0;cy++;}other=true;}
else dn=i-fd+1;
var dow=i%7;
var isToday=!other&&dn===TODAY.getDate()&&m===TODAY.getMonth()&&y===TODAY.getFullYear();
var cell=document.createElement(‘div’);
cell.className=‘day-cell’+(other?’ other’:’’)+(isToday?’ today’:’’)+(dow===0||dow===6?’ weekend’:’’);
var num=document.createElement(‘div’);num.className=‘day-num’;num.textContent=dn;
cell.appendChild(num);cal.appendChild(cell);
}
dbg.textContent=‘完成！共’+cal.children.length+‘格’;
dbg.style.background=’#d4f0d4’;
}

document.getElementById(‘p’).onclick=function(){cur.setMonth(cur.getMonth()-1);build();};
document.getElementById(‘n’).onclick=function(){cur.setMonth(cur.getMonth()+1);build();};
document.getElementById(‘t’).onclick=function(){cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);build();};
build();
</script>

</body>
</html>
